      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --success: #10b981;
      --danger: #ef4444;

      --radius: 16px;
      --glass-blur: blur(12px);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
    .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%); z-index: -1; pointer-events: none; }

    img { max-width: 100%; display: block; }

    .nav-menu span:hover { color: #fff; }
    .cart-btn { background: var(--primary); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }

    .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.4); color: #34d399; font-weight: 700; border-radius: 20px; font-size: 0.85rem;}

    /* ── Product Grid ────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    .section-title-main { font-size: 1.4rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;}
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    
    .product-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 1rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.5); }
    
    .product-img { height: 200px; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; background: #000; }

    .product-card:hover .product-img img { transform: scale(1.05); opacity: 1;}
    
    .product-info { padding: 0.2rem; }
    .product-cat { font-size: 0.75rem; color: #818cf8; font-weight: 700; text-transform: uppercase; margin-bottom: 0.3rem;}
    .product-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; height: 2.6em; overflow: hidden;}
    .product-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .stars { color: var(--warning); font-size: 0.85rem; letter-spacing: -1px;}
    .price { font-size: 1.2rem; font-weight: 800; color: #fff;}
    
    .action-btn { width: 100%; padding: 0.7rem; border-radius: 10px; border: none; background: rgba(255,255,255,0.05); color: #fff; font-weight: 600; font-size: 0.85rem; transition: background 0.2s; border: 1px solid rgba(255,255,255,0.1);}
    .product-card:hover .action-btn { background: var(--primary); border-color: var(--primary); }

    /* ── Modal Overlay ────────────────────────────────────────────── */

    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    
    .modal { background: var(--bg-color); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; width: 100%; max-width: 1050px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); animation: modalSlideUp 0.3s ease-out; position: relative; overflow: hidden; }

    .modal-close:hover { background: rgba(255,255,255,0.2); }

    /* Modal Grid */
    .modal-content { display: grid; grid-template-columns: 350px 1fr; }
    @media(max-width: 800px) { .modal-content { grid-template-columns: 1fr; } }
    
    /* Left Panel: Product & Reviews */
    .modal-left { border-right: 1px solid var(--card-border); background: rgba(255,255,255,0.02); display: flex; flex-direction: column; }

    .mh-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.2;}
    
    .reviews-container { padding: 1.5rem; overflow-y: auto; max-height: 400px; flex: 1; }
    .reviews-container h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
    .review-item { padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 0.8rem; }
    .review-item:last-child { border: none; margin-bottom: 0; }
    .r-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem;}
    .r-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; }
    .r-name { font-size: 0.8rem; font-weight: 600; }
    .r-text { font-size: 0.85rem; color: #cbd5e1; line-height: 1.5; }

    /* Right Panel: Analyis */
    .modal-right { padding: 2rem; position: relative; background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), transparent); }
    
    .analyze-btn-huge { width: 100%; padding: 1.2rem; border-radius: 14px; border: 1px solid rgba(99, 102, 241, 0.5); background: linear-gradient(135deg, var(--primary), #8b5cf6); color: #fff; font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0.8rem; transition: all 0.3s; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);}
    .analyze-btn-huge:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }

    .analyze-btn-huge.loading svg { animation: spin 1s linear infinite; }

    /* Result Dashboard */
    .result-dashboard { display: none; opacity: 0; transition: opacity 0.4s ease; margin-top: 0; }
    .result-dashboard.visible { display: block; opacity: 1; margin-top: -10px;} /* offset button removal gap */
    
    .score-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }

    .score-info p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;}

    /* Aspect Bars */
    .aspect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;}
    .aspect-item { background: rgba(255,255,255,0.03); padding: 0.8rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.02); }
    .aspect-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.5rem; font-weight: 600;}
    .aspect-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .aspect-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

    .issues-list { margin-bottom: 1.5rem; }

    .pros-cons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;}
    .pc-box { padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);}
    .pc-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;}
    .pc-item { font-size: 0.8rem; color: #cbd5e1; margin-bottom: 0.4rem; padding-left: 1.2rem; position: relative; line-height: 1.4;}
    .pc-item::before { content: '•'; position: absolute; left: 0; color: var(--text-muted); }

  </style>
</head>

async function runAnalysis() {
  if (currentProduct.isLiveDemo) {
      startLiveSimulation();
      return;
  }
  
  if (currentProduct.isSandbox && currentProduct.reviews.length === 0) {
      alert("Lütfen önce listeye bir metin ekleyin.");
      return;
  }
  
  const btn = document.getElementById('analyzeBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('http://localhost:8001/api/v1/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_name: currentProduct.name, reviews: currentProduct.reviews.map(r => r.text) })
    });
    if (!res.ok) throw new Error("API Hatası");
    const data = await res.json();
    if (!currentProduct.isSandbox) btn.style.display = 'none'; // Keep it available for sandbox to re-run
    else { btn.classList.remove('loading'); btn.disabled = false; btn.innerText = "Yeniden Analiz Et";}
    renderResults(data);
  } catch(e) {
    console.warn("API failed, using mock data for demo:", e);

    // Fallback: smart mock data based on actual review content
    const allText = currentProduct.reviews.map(r => r.text.toLowerCase()).join(' ');

    const posWords = ['mükemmel', 'harika', 'iyi', 'güzel', 'super', 'muhteşem', 'memnun', 'beğendim', 'lov', 'excellent', 'great', 'amazing'];
    const negWords = ['kötü', 'berbat', 'rezalet', 'sorunu', 'sorun', 'pismanım', 'iade', 'hayal kırıklığı', 'poor', 'bad', 'terrible', 'awful'];

    const posCount = posWords.filter(w => allText.includes(w)).length;
    const negCount = negWords.filter(w => allText.includes(w)).length;
    const sentiment = (posCount - negCount) / Math.max(posCount + negCount, 1);

    // Count sentiment types for demo
    const demoPosCount = currentProduct.reviews.filter(r => r.stars >= 4).length;
    const demoNegCount = currentProduct.reviews.filter(r => r.stars <= 2).length;
    const demoMixedCount = currentProduct.reviews.filter(r => r.stars === 3).length;

    const mockData = {
      overall_sentiment: Math.min(1, Math.max(-1, sentiment)),
      aspect_scores: {
        quality: allText.includes('kalite') ? sentiment * 0.9 : 0.1,
        shipping: allText.includes('kargo') ? sentiment * 0.95 : 0.05,
        price: allText.includes('fiyat') ? sentiment * 0.85 : 0.0,
        durability: allText.includes('batarya') || allText.includes('pil') ? sentiment * 0.88 : 0.1,
        customer_service: allText.includes('müşteri') || allText.includes('destek') ? sentiment * 0.9 : 0.05,
        usability: allText.includes('kurulum') || allText.includes('kullanım') ? sentiment * 0.85 : 0.1
      },
      buyer_summary: sentiment > 0.3 ? "Müşteriler genel olarak memnun." : sentiment < -0.3 ? "Ciddi sorunları rapor edilmiştir." : "Karışık görüşler mevcut.",
      pros: sentiment > 0 ? ["Kalite", "Kargo", "Tasarım"] : [],
      cons: sentiment < 0 ? ["Kalite sorunları", "Kargo gecikmeleri"] : [],
      red_flags: sentiment < -0.5 ? ["Düşük müşteri memnuniyeti"] : [],
      top_issues: sentiment < 0 ? [{issue: "Müşteri şikayetleri", frequency: 5, severity: "HIGH"}] : [],
      review_count: currentProduct.reviews.length,
      sentiment_breakdown: {
        positive: demoPosCount,
        negative: demoNegCount,
        mixed: demoMixedCount,
        neutral: 0
      },
      confidence: "medium"
    };

    renderResults(mockData);
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.innerText = "Analiz Tamamlandı (Demo)";
  }
}

async function startLiveSimulation() {
    const btn = document.getElementById('analyzeBtn');
    btn.style.display = 'none';
    
    let pointer = 5;
    let visibleRv = currentProduct.reviews.slice(0, pointer);
    await doApiCall(visibleRv);
    
    liveInterval = setInterval(async () => {
        if (pointer >= currentProduct.reviews.length) {
            clearInterval(liveInterval);
            document.getElementById('reviewPanelTitle').textContent = `Simülasyon Bitti (${pointer} Yorum)`;
            return;
        }
        document.getElementById('reviewPanelTitle').textContent = `Canlı Akış Aktif... Bekleniyor...`;
        
        let batch = 2; 
        for(let j=0; j<batch; j++) {
            if(pointer < currentProduct.reviews.length) {
                visibleRv.push(currentProduct.reviews[pointer]);
                pointer++;
            }
        }
        
        renderReviewsList(visibleRv);
        document.getElementById('reviewPanelTitle').textContent = `Canlı Akış: Alınan Yorum (${pointer})`;
        await doApiCall(visibleRv);
        
    }, 4000);
}

async function doApiCall(rvs) {
    try {
        const payload = {
            product_name: currentProduct.name,
            reviews: rvs.map(r => r.text)
        };

        console.log("Calling API with", rvs.length, "reviews");

        const res = await fetch('http://localhost:8001/api/v1/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            timeout: 5000
        });

        if (res.ok) {
            const data = await res.json();
            console.log("API Success:", data);
            renderResults(data);
            return;
        } else {
            console.warn("API Error status:", res.status);
            throw new Error("API returned " + res.status);
        }
    } catch(e) {
        console.warn("API failed, using client-side sentiment analysis");

        // REAL sentiment calculation using same logic as backend
        const posWords = ['mükemmel', 'harika', 'iyi', 'güzel', 'super', 'muhteşem', 'memnun', 'beğendim', 'sevdim', 'muazzam', 'çok iyi', 'gerçekten', 'kusursuz', 'kaliteli', 'şık', 'rahat', 'pratik', 'başarılı', 'çarpıcı', 'akıcı', 'artı', 'dayanıklı', 'efsane', 'fütüristik', 'gayet', 'hassas', 'inanılmaz', 'premium', 'tebrikler', 'excellent', 'great', 'amazing', 'love', 'perfect', 'wonderful'];
        const negWords = ['kötü', 'berbat', 'rezalet', 'sorun', 'pismanım', 'iade', 'çöp', 'arıza', 'bozuldu', 'çalışmıyor', 'yetersiz', 'ezilmişti', 'ezildi', 'kırılmış', 'kırıldı', 'hasar', 'hasarlı', 'zarar', 'gürültülü', 'yavaş', 'kararsız', 'çöküyor', 'çöktü', 'tutarsız', 'düşük', 'zayıf', 'mahcup', 'yangın', 'kes-bağlan', 'düştü', 'ısınıyor', 'senkronizasyonu', 'bağlantısı', 'kapasitesi', 'çatlamış', 'donup', 'donuyor', 'eziyet', 'kasmaya', 'kasıyor', 'kısıyor', 'mahvetti', 'ret', 'soluk', 'tahrişine', 'takılmalar', 'takılıyor', 'ulaşılamıyor', 'umduğumu bulamadım', 'ölü piksel', 'zor', 'yordu', 'sınırlı', 'ağır', 'eksik', 'sorunlu', 'hak etmiyor', 'dayanmıyor', 'kaldım', 'takılı', 'dönüyor', 'umduğum', 'broken', 'terrible', 'awful', 'bad', 'worst', 'crash', 'unstable', 'damaged'];
        const negationWords = ['değil', 'yok', 'olmadı', 'olmaz'];

        // Helper: check negation near word
        const hasNegationNear = (text, word, window = 4) => {
            const words = text.split(/\s+/);
            const idx = words.findIndex(w => w.includes(word));
            if (idx === -1) return false;
            const start = Math.max(0, idx - window);
            const end = Math.min(words.length, idx + window + 1);
            return words.slice(start, end).some(w => negationWords.some(neg => w.includes(neg)));
        };

        // Score each review and track sentiment type
        const reviewScoresData = rvs.map(review => {
            const text = review.text.toLowerCase();
            let posCount = posWords.filter(w => text.includes(w)).length;
            let negCount = negWords.filter(w => text.includes(w)).length;

            // Apply negation
            for (let pos of posWords) {
                if (text.includes(pos) && hasNegationNear(text, pos)) {
                    posCount--;
                    negCount++;
                }
            }
            for (let neg of negWords) {
                if (text.includes(neg) && hasNegationNear(text, neg)) {
                    negCount--;
                    posCount++;
                }
            }

            const total = posCount + negCount;
            let score = 0;
            if (total > 0) {
                score = Math.max(-1, Math.min(1, (posCount - negCount) / total));
            }

            // Determine sentiment type
            let type = 'neutral';
            if (posCount > 0 && negCount > 0) {
                type = 'mixed';
            } else if (posCount > 0) {
                type = 'positive';
            } else if (negCount > 0) {
                type = 'negative';
            }

            return { score, type, posCount, negCount };
        });

        const reviewScores = reviewScoresData.map(d => d.score);

        // Count sentiment types
        const sentimentCounts = {
            positive: reviewScoresData.filter(d => d.type === 'positive').length,
            negative: reviewScoresData.filter(d => d.type === 'negative').length,
            mixed: reviewScoresData.filter(d => d.type === 'mixed').length,
            neutral: reviewScoresData.filter(d => d.type === 'neutral').length
        };

        // Overall = average of all reviews
        const overallSentiment = reviewScores.reduce((a, b) => a + b, 0) / Math.max(reviewScores.length, 1);

        // Aspect scores - based on keyword presence in reviews
        const aspectKeywords = {
            quality: ['kalite', 'yapım', 'malzeme', 'sağlam', 'dayanıklı', 'ses', 'görüntü', 'ekran'],
            shipping: ['kargo', 'teslimat', 'paket', 'geldi', 'ulaştı', 'hızlı', 'yavaş'],
            price: ['fiyat', 'pahalı', 'ucuz', 'değer', 'bütçe'],
            durability: ['batarya', 'pil', 'ömür', 'bozuldu', 'arıza', 'çalışmıyor'],
            customer_service: ['müşteri', 'destek', 'servis', 'iade', 'garanti'],
            usability: ['kurulum', 'kolay', 'kullanım', 'arayüz', 'bağlantı']
        };

        const aspectScores = {};
        for (const [aspect, keywords] of Object.entries(aspectKeywords)) {
            const reviewsForAspect = rvs
                .map((r, idx) => keywords.some(kw => r.text.toLowerCase().includes(kw)) ? idx : -1)
                .filter(idx => idx !== -1);

            if (reviewsForAspect.length > 0) {
                const avg = reviewsForAspect.reduce((sum, idx) => sum + reviewScores[idx], 0) / reviewsForAspect.length;
                aspectScores[aspect] = Math.max(-1, Math.min(1, avg));
            } else {
                aspectScores[aspect] = overallSentiment * 0.1;
            }
        }

        const mockData = {
            overall_sentiment: overallSentiment,
            aspect_scores: aspectScores,
            buyer_summary: overallSentiment > 0.3 ? "Müşteriler genel olarak memnun." : overallSentiment < -0.3 ? "Ciddi sorunlar var." : "Karışık görüşler var.",
            pros: Object.entries(aspectScores).filter(([k,v]) => v > 0.2).map(([k]) => ({quality:'Kalite', shipping:'Kargo', price:'Fiyat', durability:'Dayanıklılık', customer_service:'Müşteri Hizmetleri', usability:'Kullanım'}[k] || k)),
            cons: Object.entries(aspectScores).filter(([k,v]) => v < -0.2).map(([k]) => ({quality:'Kalite', shipping:'Kargo', price:'Fiyat', durability:'Dayanıklılık', customer_service:'Müşteri Hizmetleri', usability:'Kullanım'}[k] || k)),
            red_flags: overallSentiment < -0.5 ? ["Düşük memnuniyet"] : [],
            top_issues: overallSentiment < -0.2 ? [{issue: "Müşteri şikayetleri", frequency: Math.floor(rvs.length * 0.5), severity: "HIGH"}] : [],
            review_count: rvs.length,
            sentiment_breakdown: sentimentCounts,
            confidence: "medium"
        };

        renderResults(mockData);
    }
}

function renderResults(data) {
  const score = data.overall_sentiment;

  // Eğer sentiment_breakdown varsa, yorum oranından skor hesapla (daha doğru)
  let satisfaction;
  if (data.sentiment_breakdown) {
    const bd = data.sentiment_breakdown;
    const total = (bd.positive || 0) + (bd.negative || 0) + (bd.mixed || 0) + (bd.neutral || 0);
    if (total > 0) {
      // Pozitif tam puan, karışık yarım puan, negatif/nötr sıfır
      // overall_sentiment ile de blend et (BERT'in cümle bazlı skoru)
      const countBased = ((bd.positive || 0) + (bd.mixed || 0) * 0.5) / total;
      const bertBased = (score + 1) / 2;
      // %60 yorum sayısı, %40 BERT skoru
      satisfaction = Math.round((countBased * 0.6 + bertBased * 0.4) * 100);
    } else {
      satisfaction = Math.round((score + 1) / 2 * 100);
    }
  } else {
    satisfaction = Math.round((score + 1) / 2 * 100);
  }
  
  let color = '#f59e0b';
  let verdict = '';
  
  if (satisfaction >= 70) {
    color = '#10b981';
    verdict = 'Ağırlıklı Olumlu';
  } else if (satisfaction >= 50) {
    color = '#f59e0b';
    verdict = 'Karışık Görüşler';
  } else if (satisfaction >= 30) {
    color = '#f59e0b';
    verdict = 'Ciddi Sorunları Olan';
  } else {
    color = '#ef4444';
    verdict = 'Kritik Sorunları Olan';
  }
  
  const aspectLabels = { quality: 'Kalite', shipping: 'Kargo', price: 'Fiyat', durability: 'Dayanıklılık', customer_service: 'Müşteri H.', usability: 'Kullanım' };
  
  const aspects = Object.entries(data.aspect_scores).map(([k,v]) => {
    const pColor = v >= 0.05 ? '#10b981' : (v <= -0.05 ? '#ef4444' : '#94a3b8');
    const width = Math.min(100, Math.max(0, (v + 1) / 2 * 100));
    return `
      <div class="aspect-item">
        <div class="aspect-header">
          <span>${aspectLabels[k] || k}</span>
          <span style="color:${pColor}">${v > 0 ? '+'+v.toFixed(2): v.toFixed(2)}</span>
        </div>
        <div class="aspect-track"><div class="aspect-fill" style="width:0; background:${pColor}" data-w="${width}%"></div></div>
      </div>
    `;
  }).join('');

  const issues = data.top_issues.map(i => `
    <div class="issue-card ${i.severity}">
      <div style="font-weight:700; font-size:0.85rem; margin-bottom:0.3rem;">🚨 ${i.issue} (x${i.frequency})</div>
      <div style="font-size:0.8rem; color:var(--text-muted)">Öneri: ${i.seller_action}</div>
    </div>
  `).join('');

  const pros = data.pros.map(p => {
      const parts = p.split(':');
      return `<div class="pc-item"><span style="color:#10b981">${parts[0]}</span>${parts[1] ? ': '+parts[1] : ''}</div>`
  }).join('');
  const cons = data.cons.map(c => {
      const parts = c.split(':');
      return `<div class="pc-item"><span style="color:#ef4444">${parts[0]}</span>${parts[1] ? ': '+parts[1] : ''}</div>`
  }).join('');

  const html = `
    <div class="score-card">
      <div class="score-circle" style="--fill-color:${color}; --fill-pct:0%">
        <div class="score-inner">
          <span class="score-val" id="scoreAnim">${currentAnimScore}</span>
          <span class="score-lbl">SKOR</span>
        </div>
      </div>
      <div class="score-info">
        <h3>${verdict}</h3>
        <p>ReviewLens AI tarafından ${data.review_count} özel metin üzerinden analiz edildi.</p>
        ${currentProduct.isLiveDemo ? '<div style="margin-top:5px; color:#ef4444; font-weight:bold; animation: pulse 2s infinite;">🔴 NLP MODELİ AKTİF İŞLİYOR...</div>' : ''}
        ${currentProduct.isSandbox ? '<div style="margin-top:5px; color:#8b5cf6; font-weight:bold;">🤖 SONUCUNUZ HAZIR</div>' : ''}
      </div>
    </div>
    
    <div class="aspect-grid">${aspects}</div>

    ${data.sentiment_breakdown ? `
      <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.05); border-radius:8px; border-left:3px solid var(--primary);">
        <h4 style="margin-bottom:10px; font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">Yorum Türü Analizi</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;">
          <div style="text-align:center; padding:10px; background:rgba(16,185,129,0.1); border-radius:6px;">
            <div style="font-size:1.8rem; font-weight:700; color:#10b981;">${data.sentiment_breakdown.positive}</div>
            <div style="font-size:0.75rem; color:#10b981; margin-top:3px;">Olumlu</div>
          </div>
          <div style="text-align:center; padding:10px; background:rgba(239,68,68,0.1); border-radius:6px;">
            <div style="font-size:1.8rem; font-weight:700; color:#ef4444;">${data.sentiment_breakdown.negative}</div>
            <div style="font-size:0.75rem; color:#ef4444; margin-top:3px;">Olumsuz</div>
          </div>
          <div style="text-align:center; padding:10px; background:rgba(245,158,11,0.1); border-radius:6px;">
            <div style="font-size:1.8rem; font-weight:700; color:#f59e0b;">${data.sentiment_breakdown.mixed}</div>
            <div style="font-size:0.75rem; color:#f59e0b; margin-top:3px;">Karışık</div>
          </div>
          <div style="text-align:center; padding:10px; background:rgba(148,163,184,0.1); border-radius:6px;">
            <div style="font-size:1.8rem; font-weight:700; color:#94a3b8;">${data.sentiment_breakdown.neutral}</div>
            <div style="font-size:0.75rem; color:#94a3b8; margin-top:3px;">Nötr</div>
          </div>
        </div>
      </div>
    ` : ''}

    ${issues ? `<h4 class="section-title">Tekrarlayan Şikayetler</h3><div class="issues-list">${issues}</div>` : ''}
    
    <div class="pros-cons-grid">
      <div class="pc-box"><div class="pc-title" style="color:#10b981">👍 Artılar</div>${pros}</div>
      <div class="pc-box"><div class="pc-title" style="color:#ef4444">👎 Eksiler</div>${cons}</div>
    </div>
    
    <div class="summary-box">
      <strong>✨ AI Özeti:</strong> ${data.buyer_summary}
    </div>
  `;
  
  const box = document.getElementById('resultBox');
  box.innerHTML = html;
  box.classList.add('visible');

  setTimeout(() => {
    document.querySelector('.score-circle').style.setProperty('--fill-pct', satisfaction + '%');
    
    let target = satisfaction;
    let step = currentAnimScore < target ? 1 : -1;
    if (currentAnimScore !== target) {
        const ival = setInterval(() => { 
            currentAnimScore += step; 
            document.getElementById('scoreAnim').innerText = currentAnimScore;
            if((step > 0 && currentAnimScore >= target) || (step < 0 && currentAnimScore <= target)) {
                currentAnimScore = target;
                document.getElementById('scoreAnim').innerText = currentAnimScore;
                clearInterval(ival);
            }
        }, 15);
    } else {
        document.getElementById('scoreAnim').innerText = currentAnimScore;
    }
    
    document.querySelectorAll('.aspect-fill').forEach(el => el.style.width = el.getAttribute('data-w'));
  }, 50);
}

// Global scope style additions for purely JS elements
if(!document.getElementById('extraStylePatch')) {
    const extraStyles = document.createElement('style');
    extraStyles.id = 'extraStylePatch';
    extraStyles.innerHTML = `
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0); } }
    `;
    document.head.appendChild(extraStyles);
}

// Init
renderGrid();
</script>


</body>
</html>
