name: reviewlens-ci

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m compileall app

      - name: Run unit tests
        run: pytest -q tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extension syntax check
        run: |
          node --check extension/background.js
          node --check extension/content.js
          node --check extension/sidepanel.js
          node --check extension/popup.js

  e2e-gate:
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install e2e dependencies
        working-directory: extension/e2e
        run: npm install

      - name: Install Playwright Chromium
        working-directory: extension/e2e
        run: npx playwright install --with-deps chromium

      - name: Run extension e2e tests
        working-directory: extension/e2e
        # Extension loading requires a real (non-headless-shell) Chromium,
        # which needs a display — xvfb-run provides a virtual one on CI.
        run: xvfb-run --auto-servernum npx playwright test
